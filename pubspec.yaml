name: xmshop
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish it to pub.dev

version: 1.0.1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies: 
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_native_splash: ^2.4.0
  get: ^4.7.3
  flutter_screenutil: ^5.9.0
  flutter_swiper_view: ^1.1.8
  dio: ^5.4.0
  flutter_staggered_grid_view: ^0.7.0
  video_player: ^2.8.3
  chewie: ^1.5.0
  
  # === 本地存储和网络（纯 Dart，无需改动）===
  get_storage: ^2.1.1  
  pin_code_fields: ^8.0.1
  cached_network_image: ^3.4.1
  flutter_smart_dialog: ^5.1.0
  flutter_widget_from_html_core: ^0.15.2
  image_picker: ^1.0.0
  url_launcher: ^6.2.0
  path_provider: ^2.1.3
  package_info_plus: ^8.3.1
  
  # === URL启动器 - 添加鸿蒙平台实现 ===
  url_launcher_harmonyos: ^0.0.1
  
  # === WebView用于替代PDF查看 ===
  webview_flutter: ^4.4.0
  
  flutter_svg: ^2.0.9
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4   # 依赖项在这里，只写版本号

# ★★★ 这里是关键：flutter_launcher_icons 的配置必须放在顶级，与 flutter: 平级 ★★★
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

# === 鸿蒙平台必须的依赖覆盖（解决间接依赖不兼容问题）===
# dependency_overrides:
#   # video_player - 鸿蒙平台使用适配版
#   video_player:
#     git:
#       url: https://gitcode.com/openharmony-tpc/flutter_packages.git
#       path: packages/video_player/video_player
#       ref: br_video_player-v2.9.2_ohos

#   # path_provider - 鸿蒙平台使用适配版
#   path_provider:
#     git:
#       url: https://gitcode.com/openharmony-tpc/flutter_packages.git
#       path: packages/path_provider/path_provider
#       ref: br_path_provider-v2.1.4_ohos

#   # chewie - 鸿蒙平台使用适配版（独立仓库）
#   chewie:
#     git:
#       url: https://atomgit.com/openharmony-sig/fluttertpc_chewie.git

flutter: 
  uses-material-design: true
  fonts:
    - family: iconfont
      fonts:
        - asset: assets/fonts/iconfont.ttf       
  assets:
    - assets/images/ceshi.png
    - assets/images/logo.jpg
    - assets/images/logo.png
    - assets/images/vip_open.jpg
    - assets/images/vip_finish.png
    - assets/fonts/wechat.svg
    - assets/fonts/zhifubao.svg
    - assets/fonts/cource.svg
    - assets/fonts/book.svg
    - assets/fonts/dzzl.svg
    - assets/fonts/news.svg
    - assets/fonts/question.svg
    - assets/fonts/dynr.svg
    - assets/fonts/fw.svg
    - assets/fonts/setting.svg
    - assets/fonts/feedback.svg
    - assets/fonts/product.svg
    - assets/fonts/ai_icon.svg
    - assets/fonts/text.svg
    - assets/fonts/vip_icon.svg

flutter_native_splash:
  color: "#F5C842"
  background_image: ""
  android: true
  ios: true
  web: false
  android_12:
    color: "#F5C842"
    icon_background_color: "#F5C842"
